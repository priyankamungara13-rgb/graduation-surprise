<script>
  const terminal = document.getElementById("terminal");
  const portal = document.getElementById("portal");

  const lines = [
    "> npm install graduation-success",
    "> importing { hardWork, lateNights, debugging } from './degree'",
    "> function celebrateGraduate() {",
    ">   return 'Congratulations, Computer Scientist!';",
    "> }",
    "> compiling final project...",
    "> running graduation.exe...",
    "> ACCESS GRANTED."
  ];

  let lineIndex = 0;
  let charIndex = 0;

  function typeCode() {
    if (lineIndex < lines.length) {
      if (charIndex < lines[lineIndex].length) {
        terminal.innerHTML += lines[lineIndex][charIndex];
        charIndex++;
        setTimeout(typeCode, 45);
      } else {
        terminal.innerHTML += "<br>";
        lineIndex++;
        charIndex = 0;
        setTimeout(typeCode, 500);
      }
    } else {
      setTimeout(() => {
        portal.style.display = "block";
      }, 700);
    }
  }

  function checkCode() {
    const secretCode = "GRAD2026";
    const userCode = document.getElementById("codeInput").value.trim();

    if (userCode === secretCode) {
      document.getElementById("message").style.display = "block";
      document.getElementById("error").innerText = "";
    } else {
      document.getElementById("error").innerText = "Wrong code. Try again.";
    }
  }

  typeCode();
</script>
