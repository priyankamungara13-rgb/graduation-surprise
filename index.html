<!DOCTYPE html>
<html>
<head>
  <title>Graduation Surprise</title>
  <style>
    body {
      background: black;
      color: lime;
      font-family: monospace;
      padding: 30px;
      font-size: 20px;
    }

    #portal {
      display: none;
      margin-top: 30px;
    }

    input, button {
      font-size: 18px;
      padding: 10px;
      margin-top: 10px;
    }

    #message {
      display: none;
      color: white;
      font-size: 32px;
      margin-top: 30px;
    }
  </style>
</head>

<body>
  <h1>Graduation Program</h1>

  <div id="terminal"></div>

  <div id="portal">
    <p>Enter secret code:</p>
    <input id="codeInput" placeholder="Enter code" />
    <button onclick="checkCode()">Run</button>
    <p id="error" style="color: red;"></p>
  </div>

  <div id="message">
    🎓 Congratulations on your graduation, you computer scientist! 🎉
  </div>

  <script>
    const terminal = document.getElementById("terminal");
    const portal = document.getElementById("portal");

    const lines = [
      "Running graduation.exe...",
      "Loading computer science files...",
      "Compiling success...",
      "Checking final project...",
      "Access portal ready."
    ];

    let i = 0;

    function runCode() {
      if (i < lines.length) {
        terminal.innerHTML += lines[i] + "<br>";
        i++;
        setTimeout(runCode, 700);
      } else {
        portal.style.display = "block";
      }
    }

    function checkCode() {
      const secretCode = "GRAD2026";
      const userCode = document.getElementById("codeInput").value.trim();

      if (userCode === secretCode) {
        document.getElementById("message").style.display = "block";
        document.getElementById("error").innerText = "";
      } else {
        document.getElementById("error").innerText = "Wrong code. Try again.";
      }
    }

    runCode();
  </script>
</body>
</html>
