<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Graduation Surprise</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #111827;
      color: white;
      text-align: center;
    }

    .card {
      background: #1f2937;
      padding: 35px;
      border-radius: 20px;
      box-shadow: 0 0 30px rgba(255, 255, 255, 0.1);
      max-width: 600px;
      width: 90%;
    }

    .terminal {
      background: #020617;
      color: #22c55e;
      text-align: left;
      padding: 20px;
      border-radius: 12px;
      font-family: "Courier New", monospace;
      min-height: 180px;
      margin-bottom: 25px;
      white-space: pre-wrap;
    }

    input {
      padding: 12px;
      border-radius: 8px;
      border: none;
      width: 80%;
      margin-top: 15px;
      font-size: 16px;
    }

    button {
      margin-top: 15px;
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      background: #60a5fa;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #3b82f6;
    }

    #portal {
      display: none;
    }

    #message {
      display: none;
      margin-top: 30px;
      font-size: 32px;
      font-weight: bold;
      animation: pop 1s ease-in-out;
    }

    .confetti {
      font-size: 40px;
      margin-top: 20px;
      display: none;
    }

    @keyframes pop {
      0% {
        transform: scale(0.5);
        opacity: 0;
      }
      100% {
        transform: scale(1);
        opacity: 1;
      }
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>Graduation Code Portal</h1>

    <div class="terminal" id="terminal"></div>

    <div id="portal">
      <p>Enter the secret code to unlock your message:</p>

      <input type="text" id="codeInput" placeholder="Enter code here" />
      <br />
      <button onclick="checkCode()">Enter</button>

      <p id="error" style="color: #f87171;"></p>

      <div id="message">
        Congratulations on your graduation, you computer scientist!
      </div>

      <div class="confetti" id="confetti">
        🎓 🎉 💻 🚀 🎉 🎓
      </div>
    </div>
  </div>

  <script>
    const lines = [
      "> Initializing graduation program...",
      "> Loading computer science achievement files...",
      "> Running final algorithm...",
      "> Compiling memories...",
      "> Checking secret access code...",
      "> System ready."
    ];

    const terminal = document.getElementById("terminal");
    const portal = document.getElementById("portal");

    let lineIndex = 0;

    function typeLine() {
      if (lineIndex < lines.length) {
        terminal.textContent += lines[lineIndex] + "\n";
        lineIndex++;
        setTimeout(typeLine, 800);
      } else {
        setTimeout(() => {
          portal.style.display = "block";
        }, 500);
      }
    }

    typeLine();

    function checkCode() {
      const secretCode = "GRAD2026";
      const userCode = document.getElementById("codeInput").value.trim();

      if (userCode === secretCode) {
        document.getElementById("message").style.display = "block";
        document.getElementById("confetti").style.display = "block";
        document.getElementById("error").textContent = "";
      } else {
        document.getElementById("error").textContent = "Wrong code. Try again!";
      }
    }
  </script>
</body>
</html>
