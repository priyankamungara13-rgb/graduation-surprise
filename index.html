<!DOCTYPE html>
<html>
<head>
  <title>Graduation Surprise</title>

  <style>
    body {
      background: black;
      color: lime;
      font-family: monospace;
      padding: 30px;
      font-size: 20px;
    }

    h1 {
      font-size: 46px;
    }

    #terminal {
      margin-top: 25px;
      white-space: pre-wrap;
      min-height: 250px;
    }

    #portal {
      display: none;
      margin-top: 30px;
    }

    input, button {
      font-size: 18px;
      padding: 10px;
      margin-top: 10px;
    }

    #message {
      display: none;
      color: white;
      font-size: 32px;
      margin-top: 30px;
    }

    #startButton {
      font-size: 22px;
      padding: 14px 20px;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <h1>Graduation Program</h1>

  <button id="startButton" onclick="startProgram()">Run Graduation Program</button>

  <div id="terminal"></div>

  <div id="portal">
    <p>Enter secret code:</p>
    <input id="codeInput" placeholder="Enter code" />
    <button onclick="checkCode()">Run</button>
    <p id="error" style="color: red;"></p>
  </div>

  <div id="message">
    🎓 Congratulations on your graduation, you computer scientist! 🎉
  </div>

  <script>
    const terminal = document.getElementById("terminal");
    const portal = document.getElementById("portal");
    const startButton = document.getElementById("startButton");

    const lines = [
      "> npm install graduation-success",
      "> importing hardWork from './degree'",
      "> importing lateNights from './debugging'",
      "> compiling final project...",
      "> checking assignments...",
      "> checking caffeine levels...",
      "> running graduation.exe...",
      "> ACCESS GRANTED."
    ];

    let lineIndex = 0;
    let charIndex = 0;

    function startProgram() {
      startButton.style.display = "none";
      typeCode();
    }

    function typeCode() {
      if (lineIndex < lines.length) {
        if (charIndex < lines[lineIndex].length) {
          terminal.innerHTML += lines[lineIndex][charIndex];
          charIndex++;
          setTimeout(typeCode, 45);
        } else {
          terminal.innerHTML += "<br>";
          lineIndex++;
          charIndex = 0;
          setTimeout(typeCode, 600);
        }
      } else {
        setTimeout(() => {
          portal.style.display = "block";
        }, 700);
      }
    }

    function checkCode() {
      const secretCode = "GRAD2026";
      const userCode = document.getElementById("codeInput").value.trim();

      if (userCode === secretCode) {
        document.getElementById("message").style.display = "block";
        document.getElementById("error").innerText = "";
      } else {
        document.getElementById("error").innerText = "Wrong code. Try again.";
      }
    }
  </script>
</body>
</html>
